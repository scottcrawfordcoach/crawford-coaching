<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<link rel="icon" type="image/png" href="/timer-favicon.png">
  <meta name="theme-color" content="#0e0f10" />
  <title>Clock | Crawford Coaching</title>
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Clock" />
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22Crawford%20Clock%22%2C%22short_name%22%3A%22Clock%22%2C%22start_url%22%3A%22.%2Fclock.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230e0f10%22%2C%22theme_color%22%3A%22%230e0f10%22%7D" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --ink:        #0e0f10;
      --fog:        #3d4a58;
      --mist:       #7a8fa3;
      --pale:       #c8d4de;
      --white:      #f5f3ef;
      --brand-blue: #2d86c4;
      --syn-orange: #e8632b;
      --sans: 'Jost', 'Helvetica Neue', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--ink);
      overflow: hidden;
    }

    body {
      font-family: var(--sans);
      color: var(--white);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding-top: 4vh;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ── Clock face — stacks on narrow, side-by-side on wide ── */
    .clock-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: clamp(0.15rem, 0.8vw, 0.5rem);
      width: 100%;
      padding: 0 clamp(1rem, 4vw, 3rem);
    }

    /* Wide layout: HH:MM and SS sit in a row */
    @media (min-aspect-ratio: 3/2) {
      .clock-wrap {
        flex-direction: row;
        align-items: baseline;
        justify-content: center;
        gap: clamp(0.5rem, 2vw, 2rem);
      }
      .bottom-row {
        display: contents; /* date sits below naturally */
      }
      .date-wrap {
        width: 100%;
        text-align: center;
        margin-top: clamp(0.3rem, 1.5vw, 0.8rem);
      }
    }

    /* HH:MM — white, large */
    .time-hhmm {
      font-family: var(--sans);
      font-weight: 300;
      font-size: clamp(5rem, 26vw, 26rem);
      line-height: 1;
      letter-spacing: 0.04em;
      color: var(--white);
      text-shadow: 0 2px 24px rgba(0,0,0,0.5);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      white-space: nowrap;
    }

    /* Separator pulse */
    .sep {
      display: inline-block;
      animation: blink 1s step-end infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.15; }
    }

    /* SS — orange, bold, smaller than HH:MM but prominent */
    .time-ss {
      font-family: var(--sans);
      font-weight: 500;
      font-size: clamp(3rem, 14vw, 16rem);
      letter-spacing: 0.04em;
      color: var(--syn-orange);
      text-shadow:
        0 0 40px rgba(232,99,43,0.3),
        0 0 80px rgba(232,99,43,0.1);
      font-variant-numeric: tabular-nums;
      font-feature-settings: "tnum";
      white-space: nowrap;
    }

    /* Date line — brand blue */
    .date-line {
      font-family: var(--sans);
      font-weight: 300;
      font-size: clamp(0.75rem, 2.2vw, 1.3rem);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--brand-blue);
      margin-top: clamp(0.3rem, 1.2vw, 0.6rem);
    }

    /* Wide: date lives below the row pair */
    .date-wrap {
      width: 100%;
      display: flex;
      justify-content: center;
    }

    /* 12/24h toggle */
    .toggle-btn {
      position: fixed;
      top: clamp(0.8rem, 2vw, 1.5rem);
      right: clamp(1rem, 3vw, 2rem);
      font-family: var(--sans);
      font-weight: 300;
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--pale);
      background: transparent;
      border: 1px solid rgba(61,74,88,0.5);
      border-radius: 2px;
      padding: 0.4rem 0.9rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
      z-index: 20;
    }
    .toggle-btn:hover {
      color: var(--white);
      border-color: var(--fog);
    }

    /* Branding logo — top left */
    .watermark {
      position: fixed;
      top: clamp(0.8rem, 2vw, 1.5rem);
      left: clamp(1rem, 3vw, 2rem);
      height: clamp(28px, 4.5vw, 52px);
      width: auto;
      opacity: 1;
      z-index: 20;
    }

    /* Tap layer */
    .tap-layer {
      position: fixed;
      inset: 0;
      z-index: 10;
    }

    @keyframes flash { 0%,100%{opacity:0} 50%{opacity:0.04} }
    .tap-layer.flash { animation: flash 0.3s ease; }
  </style>
</head>
<body>

  <div class="clock-wrap">
    <div class="time-hhmm" id="hhmm">
      <span id="hh">--</span><span class="sep">:</span><span id="mm">--</span>
    </div>
    <div class="time-ss" id="ss">--</div>
  </div>
  <div class="date-wrap">
    <div class="date-line" id="dateline">---</div>
  </div>

  <button class="toggle-btn" id="toggleBtn">24h</button>

  <div class="tap-layer" id="tapLayer"></div>

  <script>
    const hhEl   = document.getElementById('hh');
    const mmEl   = document.getElementById('mm');
    const ssEl   = document.getElementById('ss');
    const dateEl = document.getElementById('dateline');
    const toggle = document.getElementById('toggleBtn');
    const tap    = document.getElementById('tapLayer');

    let use24 = false;

    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    function pad(n) { return String(n).padStart(2, '0'); }

    function tick() {
      const now = new Date();
      let h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      if (!use24) { h = h % 12 || 12; }
      hhEl.textContent = pad(h);
      mmEl.textContent = pad(m);
      ssEl.textContent = pad(s);
      dateEl.textContent = DAYS[now.getDay()] + '  ·  ' + MONTHS[now.getMonth()] + ' ' + now.getDate();
    }

    function startClock() {
      tick();
      const delay = 1000 - (Date.now() % 1000);
      setTimeout(() => { tick(); setInterval(tick, 1000); }, delay);
    }

    startClock();

    toggle.addEventListener('click', (e) => {
      e.stopPropagation();
      use24 = !use24;
      toggle.textContent = use24 ? '12h' : '24h';
      tick();
    });

    let wakeLock = null;
    async function requestWakeLock() {
      if ('wakeLock' in navigator) {
        try { wakeLock = await navigator.wakeLock.request('screen'); } catch (_) {}
      }
    }
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') requestWakeLock();
    });
    requestWakeLock();

    tap.addEventListener('click', () => {
      tap.classList.add('flash');
      tap.addEventListener('animationend', () => tap.classList.remove('flash'), { once: true });
      requestWakeLock();
    });
  </script>
