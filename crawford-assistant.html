<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assistant - Crawford Coaching</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #0e0f10;
    --slate: #1c2330;
    --fog: #3d4a58;
    --pale: #c8d4de;
    --white: #f5f3ef;
    --brand-blue: #2d86c4;
    --sans: 'Jost', sans-serif;
    --serif-display: 'Cormorant Garamond', Georgia, serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    width: 100%;
    height: 100%;
    background: var(--ink);
    color: var(--white);
  }

  body {
    display: flex;
    flex-direction: column;
    font-family: var(--sans);
  }

  .assistant-shell {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1rem;
    border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    background: var(--slate);
    min-height: 58px;
  }

  .assistant-title {
    display: flex;
    flex-direction: column;
    gap: 0.05rem;
  }

  .assistant-title strong {
    font-family: var(--serif-display);
    font-weight: 400;
    font-size: 1.15rem;
    line-height: 1;
  }

  .assistant-title span {
    font-size: 0.58rem;
    font-weight: 300;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pale);
  }

  .assistant-open {
    border: 1px solid rgba(45, 134, 196, 0.45);
    color: var(--pale);
    text-decoration: none;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.45rem 0.65rem;
    border-radius: 1px;
    white-space: nowrap;
  }

  .assistant-frame-wrap {
    flex: 1;
    min-height: 0;
    background: linear-gradient(180deg, #111826 0%, #0e0f10 100%);
  }

  .assistant-frame {
    width: 100%;
    height: 100%;
    border: 0;
    background: var(--ink);
  }

  .assistant-status {
    margin: 0;
    padding: 0.45rem 1rem;
    font-size: 0.66rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--fog);
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    background: #0b0c0d;
  }

  @media (max-width: 700px) {
    .assistant-shell {
      padding: 0.7rem 0.8rem;
    }

    .assistant-open {
      font-size: 0.58rem;
      padding: 0.42rem 0.6rem;
    }
  }
</style>
</head>
<body>
  <header class="assistant-shell">
    <div class="assistant-title">
      <strong>Ask Scott</strong>
      <span>AI Assistant - Crawford Coaching</span>
    </div>
    <a class="assistant-open" href="https://website-assistant-sandy.vercel.app/" target="_blank" rel="noopener">Open In New Tab</a>
  </header>

  <main class="assistant-frame-wrap">
    <iframe
      id="assistantFrame"
      class="assistant-frame"
      title="Ask Scott Assistant"
      src="https://website-assistant-sandy.vercel.app/"
      loading="eager"
      referrerpolicy="strict-origin-when-cross-origin"
      allow="clipboard-write"
    ></iframe>
  </main>

  <p class="assistant-status" id="assistantStatus">Loading assistant...</p>

  <script>
    (function () {
      const frame = document.getElementById('assistantFrame');
      const status = document.getElementById('assistantStatus');
      const fallbackUrl = 'https://website-assistant-sandy.vercel.app/';
      let loaded = false;

      frame.addEventListener('load', function () {
        loaded = true;
        status.textContent = 'Assistant ready';
      });

      // If browser blocks iframe embedding, redirect directly.
      window.setTimeout(function () {
        if (!loaded) {
          status.textContent = 'Opening hosted assistant...';
          window.location.replace(fallbackUrl);
        }
      }, 3500);
    })();
  </script>
</body>
</html>
